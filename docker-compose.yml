version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexora_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: nexora_master
    ports:
      - "5432:5432"
    volumes:
      - nexora_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexora_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - nexora_redis_data:/data

volumes:
  nexora_pg_data:
  nexora_redis_data: